name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-flight deploys

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─── Build & Push Docker Images ───────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      web-image: ${{ steps.meta-web.outputs.tags }}
      api-image: ${{ steps.meta-api.outputs.tags }}
      image-tag: ${{ steps.tags.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tags
        run: |
          SHA=$(echo ${{ github.sha }} | head -c7)
          TAG="${SHA}-$(date +%Y%m%d)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/chefer-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Docker metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/chefer-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_TRPC_URL=${{ vars.NEXT_PUBLIC_TRPC_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Run DB Migrations ────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: docker-build
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm db:migrate:prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─── Deploy to Production ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [docker-build, migrate]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.DEPLOYMENT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        # Replace with your actual deployment mechanism:
        # - SSH + docker compose pull && docker compose up -d
        # - kubectl set image deployment/...
        # - AWS ECS update-service
        # - Vercel, Railway, Render, etc.
        run: |
          echo "🚀 Deploying chefer-web:${{ needs.docker-build.outputs.image-tag }}"
          echo "🚀 Deploying chefer-api:${{ needs.docker-build.outputs.image-tag }}"
          echo "📝 Replace this step with your actual deployment command"
          # Example SSH deployment:
          # ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          #   "cd /opt/chefer && \
          #    export TAG=${{ needs.docker-build.outputs.image-tag }} && \
          #    docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && \
          #    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build"

      - name: Smoke test
        run: |
          sleep 10
          curl -f ${{ vars.DEPLOYMENT_URL }}/api/health || echo "Health check failed"

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deployment status: $STATUS"
          # Add Slack/Discord/email notification here
